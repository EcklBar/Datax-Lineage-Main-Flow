<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DataX Pipeline Lineage</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #0f172a; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

header {
  padding: 14px 24px 12px; border-bottom: 1px solid #e2e8f0; background: #fff;
  display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; flex-shrink: 0;
}
header h1 { font-size: 17px; font-weight: 600; }
header p  { font-size: 12px; color: #64748b; margin-top: 3px; }
.controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.btn {
  padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid #e2e8f0; background: #fff; color: #475569; transition: all .15s;
}
.btn:hover { background: #f1f5f9; }
.btn.active { background: #0f172a; color: #fff; border-color: #0f172a; }
input[type=search], select {
  padding: 6px 10px; border-radius: 6px; font-size: 12px;
  border: 1px solid #e2e8f0; background: #fff; color: #0f172a;
}
input[type=search] { min-width: 240px; max-width: 360px; flex: 1; }
.chk { font-size: 11px; color: #64748b; display: flex; align-items: center; gap: 4px; white-space: nowrap; }

.legend {
  display: flex; gap: 14px; flex-wrap: wrap; flex-shrink: 0;
  padding: 8px 24px; border-bottom: 1px solid #e2e8f0; background: #fff; font-size: 11px; color: #64748b;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-swatch { width: 10px; height: 10px; border-radius: 2px; }

.main { flex: 1; display: grid; grid-template-columns: 280px 1fr; min-height: 0; }
.sidebar { border-right: 1px solid #e2e8f0; background: #fff; display: flex; flex-direction: column; min-height: 0; }
.sidebar .st { padding: 10px 12px 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: #94a3b8; }
.list { overflow: auto; flex: 1; padding: 4px 8px 12px; }
.item { padding: 7px 9px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
.item:hover { background: #f1f5f9; }
.item.selected { background: #eff6ff; border-color: #bfdbfe; }
.item .name { font-size: 11px; font-weight: 600; word-break: break-all; }
.item .meta { font-size: 10px; color: #94a3b8; margin-top: 2px; }

.scroll-wrap { overflow: auto; padding: 20px 24px 40px; background: #f8fafc; position: relative; }
.diagram-outer { position: relative; display: inline-block; min-width: 1200px; }
#svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
#node-layer { position: relative; }

.node {
  position: absolute; width: 200px; background: #fff;
  border: 1.5px solid #e2e8f0; border-left-width: 4px; border-radius: 8px;
  padding: 7px 10px; cursor: pointer; transition: box-shadow .15s, opacity .15s; user-select: none;
}
.node:hover { box-shadow: 0 4px 14px rgba(0,0,0,.1); z-index: 10; }
.node .n-label { font-size: 11px; font-weight: 600; color: #0f172a; line-height: 1.35; word-break: break-all; }
.node .n-sub   { font-size: 10px; color: #94a3b8; margin-top: 2px; line-height: 1.3; }
.node.dimmed { opacity: .18; }
.node.highlighted { box-shadow: 0 0 0 2px #64748b, 0 4px 14px rgba(0,0,0,.12); z-index: 10; }
.node.focus { box-shadow: 0 0 0 2px #0f172a, 0 4px 14px rgba(0,0,0,.15); z-index: 11; }

.t-source{border-left-color:#ea580c}
.t-enrichment{border-left-color:#d97706}
.t-faue{border-left-color:#7c3aed}
.t-unified{border-left-color:#0284c7}
.t-agg{border-left-color:#0d9488}
.t-sql{border-left-color:#ca8a04}
.t-dbt{border-left-color:#9333ea}
.t-bq{border-left-color:#16a34a}
.t-vertica{border-left-color:#db2777}

.detail {
  position: absolute; right: 16px; top: 16px; width: 300px; max-height: calc(100% - 32px);
  overflow: auto; background: rgba(255,255,255,.97); border: 1px solid #e2e8f0;
  border-radius: 10px; padding: 12px; font-size: 11px; display: none; z-index: 20;
  box-shadow: 0 8px 24px rgba(15,23,42,.08);
}
.detail.show { display: block; }
.detail h3 { font-size: 13px; margin-bottom: 6px; word-break: break-all; }
.detail .row { margin: 5px 0; color: #64748b; line-height: 1.4; }
.detail code { color: #0369a1; font-size: 10px; word-break: break-all; }

.tip {
  position: fixed; background: #1e293b; color: #e2e8f0; border-radius: 8px;
  padding: 9px 13px; font-size: 11px; max-width: 320px; pointer-events: none; z-index: 200;
  display: none; box-shadow: 0 8px 24px rgba(0,0,0,.3); line-height: 1.5;
}
.tip.show { display: block; }
.tip strong { color: #fff; display: block; margin-bottom: 4px; font-size: 12px; }
.empty {
  position: absolute; inset: 40px; display: flex; align-items: center; justify-content: center;
  color: #94a3b8; font-size: 13px; text-align: center; pointer-events: none;
}
</style>
</head>
<body>

<header>
  <div>
    <h1>DataX Pipeline — Full Lineage</h1>
    <p id="stats-line">Loading…</p>
  </div>
  <div class="controls">
    <input type="search" id="q" placeholder="Search any table… e.g. fast_section_traffic" />
    <select id="layer">
      <option value="">All layers</option>
      <option value="raw">Raw</option>
      <option value="enrich">Enrichment</option>
      <option value="faue">faue</option>
      <option value="unified">Unified</option>
      <option value="fact">Fact</option>
      <option value="sql">Trino SQL</option>
      <option value="dbt">DBT</option>
      <option value="dim">Dimensions</option>
      <option value="sink">Sinks</option>
      <option value="unknown">Unknown</option>
    </select>
    <select id="pattern">
      <option value="">All patterns</option>
      <option value="A">A Spark→Hive→Vertica→BQ</option>
      <option value="B">B Trino SQL</option>
      <option value="C">C DBT</option>
    </select>
    <button class="btn active" id="btn-core" type="button">Core spine</button>
    <button class="btn active" id="btn-path-all" type="button" data-path="all">All</button>
    <button class="btn" id="btn-path-rt" type="button" data-path="rt">RT</button>
    <button class="btn" id="btn-path-batch" type="button" data-path="batch">Batch</button>
    <label class="chk"><input type="checkbox" id="show-isolated" /> Show isolated</label>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#ea580c"></div>Raw</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#d97706"></div>Enrich / Dim</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#7c3aed"></div>faue</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#0284c7"></div>Unified</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#0d9488"></div>Fact</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#ca8a04"></div>Trino</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#9333ea"></div>DBT</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#16a34a"></div>BQ</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#db2777"></div>Vertica</div>
  <div class="legend-item">Columns = dependency steps (left→right) · hover traces lineage</div>
</div>

<div class="main">
  <aside class="sidebar">
    <div class="st" id="list-title">Tables</div>
    <div class="list" id="list"></div>
  </aside>
  <div class="scroll-wrap" id="scroll-wrap">
    <div class="empty" id="empty"></div>
    <div class="diagram-outer" id="diagram-outer">
      <div id="node-layer"></div>
      <svg id="svg-layer"></svg>
    </div>
    <div class="detail" id="detail"></div>
  </div>
</div>

<div class="tip" id="tip"><strong id="tip-title"></strong><span id="tip-body"></span></div>

/** Longest-path ranks so every edge goes left → right (no same-column deps). */
function assignRanks(nodes, edges) {
  const ids = new Set(nodes.map(n => n.id));
  const preds = {};
  ids.forEach(id => { preds[id] = []; });
  edges.forEach(e => {
    if (ids.has(e.f) && ids.has(e.t) && e.f !== e.t) preds[e.t].push(e.f);
  });
  const rank = {};
  const visiting = new Set();
  const done = new Set();
  function dfs(id) {
    if (done.has(id)) return rank[id];
    if (visiting.has(id)) return rank[id] ?? 0; // cycle: don't inflate
    visiting.add(id);
    let r = 0;
    for (const p of preds[id]) r = Math.max(r, dfs(p) + 1);
    visiting.delete(id);
    done.add(id);
    rank[id] = r;
    return r;
  }
  ids.forEach(id => dfs(id));
  return rank;
}

function dominantLayer(list) {
  const c = {};
  list.forEach(n => { c[n.layer] = (c[n.layer] || 0) + 1; });
  return Object.entries(c).sort((a, b) => b[1] - a[1])[0]?.[0] || 'unknown';
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function edgeKey(e) { return e.f + '→' + e.t; }

function bfs(start, adj, next) {
  const seen = new Set([start]);
  const q = [start];
  const hit = [];
  while (q.length) {
    const cur = q.shift();
    for (const e of (adj[cur] || [])) {
      if (pathFilter !== 'all' && e.path !== 'both' && e.path !== pathFilter) continue;
      hit.push(e);
      const n = next(e);
      if (!seen.has(n)) { seen.add(n); q.push(n); }
    }
  }
  return { nodes: seen, edges: hit };
}

function selectFocus(id) {
  if (!byId[id]) return;
  mode = 'focus'; focusId = id;
  document.getElementById('btn-core').classList.remove('active');
  const up = bfs(id, bwd, e => e.f);
  const down = bfs(id, fwd, e => e.t);
  const ids = new Set([...up.nodes, ...down.nodes]);
  const ek = new Set(); const elist = [];
  for (const e of [...up.edges, ...down.edges]) {
    const k = edgeKey(e);
    if (!ek.has(k) && ids.has(e.f) && ids.has(e.t)) { ek.add(k); elist.push(e); }
  }
  renderGraph([...ids].map(i => byId[i]).filter(Boolean), elist, id);
  showDetail(byId[id]);
  renderList();
}

  const coreLayers = new Set(['raw','faue','unified','fact','sink']);
  [...ids].forEach(id => {
    for (const e of [...(fwd[id]||[]), ...(bwd[id]||[])]) {
      if (pathFilter !== 'all' && e.path !== 'both' && e.path !== pathFilter) continue;
      const other = e.f === id ? e.t : e.f;
      const n = byId[other];
      if (n && (coreLayers.has(n.layer) || CORE_SEEDS.includes(other))) ids.add(other);
    }
  });
  ['fast_section_traffic','facm_campaign_traffic','faem_engage_all_traffic','faam_amplify_all_traffic'].forEach(s => {
    if (!byId[s]) return;
    bfs(s, bwd, e => e.f).nodes.forEach(id => {
      const n = byId[id];
      if (n && coreLayers.has(n.layer)) ids.add(id);
    });
  });
  const elist = []; const ek = new Set();
  DATA.edges.forEach(e => {
    if (!ids.has(e.f) || !ids.has(e.t)) return;
    if (pathFilter !== 'all' && e.path !== 'both' && e.path !== pathFilter) return;
    const k = edgeKey(e);
    if (!ek.has(k)) { ek.add(k); elist.push(e); }
  });
  renderGraph([...ids].map(i => byId[i]).filter(Boolean), elist, null);
  renderList();
}

function setPathFilter(f) {
  pathFilter = f;
  ['all','rt','batch'].forEach(p => {
    document.getElementById('btn-path-'+p).classList.toggle('active', p === f);
  });
  if (mode === 'focus' && focusId) selectFocus(focusId);
  else showCore();
}

function matchesList(n) {
  if (layerFilter) {
    if (layerFilter === 'enrich') {
      if (n.layer !== 'enrich' && n.layer !== 'dim') return false;
    } else if (n.layer !== layerFilter) return false;
  }
  if (patternFilter && n.pattern !== patternFilter) return false;
  if (searchQ) {
    const q = searchQ.toLowerCase();
    const hay = [n.id, n.meta?.config, n.meta?.sql, n.meta?.dbt, n.meta?.wfe_spark].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  } else if (!showIsolated && (n.deg || 0) === 0 && n.kind !== 'sink') {
    return false;
  }
  return true;
}

function renderList() {
  const items = DATA.nodes.filter(matchesList);
  items.sort((a,b) => {
    if (searchQ) return a.id.length - b.id.length || a.id.localeCompare(b.id);
    // prefer connected, then core-ish layers, then degree, then name
    const layerBoost = { raw:3, faue:3, unified:3, fact:2, sink:2, sql:1, dbt:1, dim:0, unknown:0 };
    const ba = (a.deg>0?10:0) + (layerBoost[a.layer]||0);
    const bb = (b.deg>0?10:0) + (layerBoost[b.layer]||0);
    return bb-ba || (b.deg-a.deg) || a.id.localeCompare(b.id);
  });
  document.getElementById('list-title').textContent = `Tables (${items.length})`;
  const show = items.slice(0, 400);
  const list = document.getElementById('list');
  list.innerHTML = show.map(n => `
    <div class="item ${focusId===n.id?'selected':''}" data-id="${esc(n.id)}">
      <div class="name">${esc(n.id)}</div>
      <div class="meta">${esc(n.layer)}${n.pattern?' · P'+esc(n.pattern):''} · ${n.deg||0} links</div>
    </div>`).join('') + (items.length>400?`<div class="item"><div class="meta">… refine search</div></div>`:'');
  list.querySelectorAll('.item[data-id]').forEach(el => {
    el.onclick = () => selectFocus(el.dataset.id);
  });
}

function showDetail(n) {
  if (!n) return;
  const el = document.getElementById('detail');
  const ups = (bwd[n.id]||[]).map(e=>e.f);
  const downs = (fwd[n.id]||[]).map(e=>e.t);
  el.classList.add('show');
  el.innerHTML = `<h3>${esc(n.id)}</h3>
    <div class="row">${esc(n.layer)}${n.pattern?` · Pattern ${esc(n.pattern)}`:''} · ${esc(n.kind||'')}</div>
    ${n.sinks?.length?`<div class="row">Sinks: ${esc(n.sinks.join(', '))}</div>`:''}
    ${n.meta?.config?`<div class="row">Config: <code>${esc(n.meta.config)}</code></div>`:''}
    ${n.meta?.sql?`<div class="row">SQL: <code>${esc(n.meta.sql)}</code></div>`:''}
    ${n.meta?.dbt?`<div class="row">DBT: <code>${esc(n.meta.dbt)}</code></div>`:''}
    ${n.meta?.wfe_spark?`<div class="row">WFE: <code>${esc(n.meta.wfe_spark)}</code></div>`:''}
    ${n.meta?.wfe_vertica?`<div class="row">WFE Vertica: <code>${esc(n.meta.wfe_vertica)}</code></div>`:''}
    ${n.meta?.wfe_verticaOnline?`<div class="row">WFE Online: <code>${esc(n.meta.wfe_verticaOnline)}</code></div>`:''}
    <div class="row"><b>Upstream (${ups.length})</b><br/>${ups.slice(0,12).map(x=>`<code>${esc(x)}</code>`).join('<br/>')}${ups.length>12?'<br/>…':''}</div>
    <div class="row"><b>Downstream (${downs.length})</b><br/>${downs.slice(0,12).map(x=>`<code>${esc(x)}</code>`).join('<br/>')}${downs.length>12?'<br/>…':''}</div>`;
}

function renderGraph(nodes, edges, focus) {
  visibleNodeIds = new Set(nodes.map(n => n.id));
  const empty = document.getElementById('empty');
  empty.style.display = nodes.length ? 'none' : '';
  empty.textContent = 'No tables match — try another search.';

  const NW=200, NH=52, RG=12, HEADER_H=40, PAD_X=24, PAD_Y=28, COL_GAP=120;

  // Dynamic columns from dependency order (fadi left of faac, never same column)
  const ranks = assignRanks(nodes, edges);
  const cols = {};
  nodes.forEach(n => {
    const c = ranks[n.id] ?? 0;
    (cols[c] ||= []).push(n);
  });
  const colKeys = Object.keys(cols).map(Number).sort((a,b)=>a-b);

  // Barycenter order within columns to reduce crossings
  const rankMap = {};
  colKeys.forEach(c => cols[c].forEach((n,i) => { rankMap[n.id] = i; }));
  for (let pass = 0; pass < 3; pass++) {
    colKeys.forEach(c => {
      cols[c].sort((a,b) => {
        if (a.id === focus) return -1;
        if (b.id === focus) return 1;
        const aPreds = edges.filter(e => e.t === a.id).map(e => rankMap[e.f]).filter(x => x != null);
        const bPreds = edges.filter(e => e.t === b.id).map(e => rankMap[e.f]).filter(x => x != null);
        const aBar = aPreds.length ? aPreds.reduce((s,x)=>s+x,0)/aPreds.length : (rankMap[a.id] ?? 0);
        const bBar = bPreds.length ? bPreds.reduce((s,x)=>s+x,0)/bPreds.length : (rankMap[b.id] ?? 0);
        return aBar - bBar || (b.deg||0)-(a.deg||0) || a.id.localeCompare(b.id);
      });
      cols[c].forEach((n,i) => { rankMap[n.id] = i; });
    });
  }

  const maxRows = Math.max(1, ...colKeys.map(c => cols[c].length));
  const colIndex = {}; colKeys.forEach((c,i)=>colIndex[c]=i);
  const CANVAS_W = PAD_X*2 + colKeys.length*(NW+COL_GAP);
  const CANVAS_H = HEADER_H + PAD_Y*2 + maxRows*(NH+RG);

  const outer = document.getElementById('diagram-outer');
  const layer = document.getElementById('node-layer');
  const svgEl = document.getElementById('svg-layer');
  outer.style.height = CANVAS_H+'px';
  outer.style.minWidth = CANVAS_W+'px';
  layer.style.height = CANVAS_H+'px';
  layer.innerHTML = '';
  svgEl.innerHTML = '';
  svgEl.setAttribute('viewBox', `0 0 ${CANVAS_W} ${CANVAS_H}`);
  svgEl.setAttribute('width', CANVAS_W);
  svgEl.setAttribute('height', CANVAS_H);

  // Headers: Stage N · dominant type in that dependency step
  const hdr = document.createElement('div');
  hdr.style.cssText = `position:absolute;top:0;left:0;width:100%;height:${HEADER_H}px;`;
  colKeys.forEach((c, i) => {
    const dom = dominantLayer(cols[c]);
    const color = LAYER_COLOR[dom] || '#64748b';
    const d = document.createElement('div');
    const x = PAD_X + i*(NW+COL_GAP);
    d.style.cssText = `position:absolute;left:${x}px;top:6px;width:${NW}px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:${color};`;
    d.textContent = `Step ${i + 1} · ${LAYER_NAME[dom] || dom}`;
    hdr.appendChild(d);
  });
  layer.appendChild(hdr);

  const nodePos = {};
  colKeys.forEach(c => {
    const list = cols[c];
    const colH = list.length*NH + (list.length-1)*RG;
    const top = HEADER_H + PAD_Y + Math.round((maxRows*(NH+RG)-RG - colH)/2);
    const x = PAD_X + colIndex[c]*(NW+COL_GAP);
    list.forEach((n,i) => { nodePos[n.id] = { x, y: top + i*(NH+RG), rank: c }; });
  });

  nodeEls = {};
  nodes.forEach(n => {
    const p = nodePos[n.id];
    const d = document.createElement('div');
    d.className = `node t-${n.type||'source'}` + (n.id===focus?' focus':'');
    d.style.left = p.x+'px'; d.style.top = p.y+'px';
    d.innerHTML = `<div class="n-label">${esc(n.label||n.id)}</div><div class="n-sub">${esc(n.sub||n.layer)}</div>`;
    d.onmouseenter = e => { onHover(n.id); showTip(e,n); };
    d.onmousemove = moveTip;
    d.onmouseleave = () => { clearHover(); hideTip(); };
    d.onclick = () => selectFocus(n.id);
    layer.appendChild(d);
    nodeEls[n.id] = d;
  });

  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML = `<marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#cbd5e1"/></marker>
    <marker id="arr-rt" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#10b981"/></marker>
    <marker id="arr-batch" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#3b82f6"/></marker>`;
  svgEl.appendChild(defs);

  edgeEls = [];
  edges.forEach(e => {
    const fp = nodePos[e.f], tp = nodePos[e.t];
    if (!fp || !tp) return;

    let d;
    // Always prefer left→right: exit right of source, enter left of target
    if (tp.x > fp.x) {
      const x1 = fp.x + NW, y1 = fp.y + NH/2;
      const x2 = tp.x, y2 = tp.y + NH/2;
      const dx = Math.max(40, (x2 - x1) * 0.45);
      d = `M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`;
    } else if (tp.x === fp.x) {
      // Same column (cycle remnant): vertical edge on the right side
      const x = fp.x + NW + 14;
      const y1 = fp.y + NH/2, y2 = tp.y + NH/2;
      d = `M${fp.x+NW},${y1} L${x},${y1} L${x},${y2} L${tp.x+NW},${y2}`;
    } else {
      // Backward edge (cycle): route below, still end at left of target
      const x1 = fp.x + NW, y1 = fp.y + NH/2;
      const x2 = tp.x, y2 = tp.y + NH/2;
      const yMid = Math.max(y1, y2) + NH + 20;
      d = `M${x1},${y1} C${x1+40},${y1} ${x1+40},${yMid} ${(x1+x2)/2},${yMid} S${x2-40},${y2} ${x2},${y2}`;
    }

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', d);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','#cbd5e1');
    path.setAttribute('stroke-width','1.2');
    path.setAttribute('marker-end','url(#arr)');
    path.setAttribute('opacity','0.7');
    path.dataset.from=e.f; path.dataset.to=e.t; path.dataset.path=e.path||'both';
    svgEl.appendChild(path);
    edgeEls.push(path);
  });
}

function bfsReach(start, adj) {
  const seen = new Set([start]);
  const q = [start];
  while (q.length) {
    const cur = q.shift();
    for (const e of (adj[cur]||[])) {
      const nxt = adj===fwd ? e.t : e.f;
      if (visibleNodeIds.has(nxt) && !seen.has(nxt)) { seen.add(nxt); q.push(nxt); }
    }
  }
  return seen;
}

function onHover(id) {
  const rel = new Set([...bfsReach(id, fwd), ...bfsReach(id, bwd)]);
  Object.keys(nodeEls).forEach(nid => {
    const el = nodeEls[nid];
    if (rel.has(nid)) { el.classList.remove('dimmed'); el.classList.add('highlighted'); }
    else { el.classList.add('dimmed'); el.classList.remove('highlighted'); }
  });
  edgeEls.forEach(p => {
    const ok = rel.has(p.dataset.from) && rel.has(p.dataset.to);
    if (ok) {
      const ep = p.dataset.path;
      p.setAttribute('stroke', ep==='rt'?'#10b981':ep==='batch'?'#3b82f6':'#94a3b8');
      p.setAttribute('stroke-width','2'); p.setAttribute('opacity','1');
      p.setAttribute('marker-end', ep==='rt'?'url(#arr-rt)':ep==='batch'?'url(#arr-batch)':'url(#arr)');
    } else {
      p.setAttribute('stroke','#e2e8f0'); p.setAttribute('stroke-width','1'); p.setAttribute('opacity','0.35');
    }
  });
}

function clearHover() {
  Object.values(nodeEls).forEach(el => el.classList.remove('dimmed','highlighted'));
  edgeEls.forEach(p => {
    p.setAttribute('stroke','#cbd5e1'); p.setAttribute('stroke-width','1.2');
    p.setAttribute('opacity','0.7'); p.setAttribute('marker-end','url(#arr)');
  });
}

const tipEl = document.getElementById('tip');
function showTip(e, n) {
  document.getElementById('tip-title').textContent = n.id;
  document.getElementById('tip-body').textContent =
    (n.tip||'') + `\n↑${(bwd[n.id]||[]).length} upstream · ↓${(fwd[n.id]||[]).length} downstream`;
  tipEl.classList.add('show'); moveTip(e);
}
function moveTip(e) { tipEl.style.left=(e.clientX+14)+'px'; tipEl.style.top=(e.clientY+14)+'px'; }
function hideTip() { tipEl.classList.remove('show'); }

document.getElementById('btn-core').onclick = showCore;
document.getElementById('btn-path-all').onclick = () => setPathFilter('all');
document.getElementById('btn-path-rt').onclick = () => setPathFilter('rt');
document.getElementById('btn-path-batch').onclick = () => setPathFilter('batch');
document.getElementById('q').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  renderList();
  if (searchQ && byId[searchQ]) selectFocus(searchQ);
  else {
    const hits = DATA.nodes.filter(matchesList);
    if (hits.length === 1) selectFocus(hits[0].id);
  }
});
document.getElementById('pattern').addEventListener('change', e => { patternFilter = e.target.value; renderList(); });
document.getElementById('layer').addEventListener('change', e => { layerFilter = e.target.value; renderList(); });
document.getElementById('show-isolated').addEventListener('change', e => {
  showIsolated = e.target.checked; renderList();
});

renderList();
try {
  const params = new URLSearchParams(location.search);
  if (params.get('t') && byId[params.get('t')]) selectFocus(params.get('t'));
  else showCore();
} catch (_) { showCore(); }
</script>
</body>
</html>
