<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DataX Full Lineage Explorer</title>
<style>
:root {
  --bg: #0b1220; --panel: #111827; --border: #1f2937; --text: #e5e7eb; --muted: #9ca3af;
  --raw:#f97316; --faue:#a78bfa; --unified:#38bdf8; --fact:#2dd4bf; --sql:#fbbf24;
  --dbt:#c084fc; --dim:#94a3b8; --sink:#4ade80; --unknown:#64748b; --accent:#60a5fa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
header { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--panel); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
header h1 { font-size: 15px; font-weight: 600; white-space: nowrap; }
header .stats { font-size: 11px; color: var(--muted); }
.controls { display: flex; gap: 8px; flex: 1; align-items: center; flex-wrap: wrap; }
input[type=search] { flex: 1; min-width: 200px; max-width: 420px; background: #0b1220; border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 12px; font-size: 13px; }
select, button {
  background: #0b1220; border: 1px solid var(--border); color: var(--text);
  border-radius: 8px; padding: 7px 10px; font-size: 12px; cursor: pointer;
}
button:hover, select:hover { border-color: var(--accent); }
button.active { background: var(--accent); color: #0b1220; border-color: var(--accent); font-weight: 600; }
.main { flex: 1; display: grid; grid-template-columns: 320px 1fr; min-height: 0; }
.sidebar { border-right: 1px solid var(--border); background: var(--panel); display: flex; flex-direction: column; min-height: 0; }
.sidebar .section-title { padding: 10px 12px 6px; font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 700; }
.list { overflow: auto; flex: 1; padding: 0 6px 12px; }
.item {
  padding: 7px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
  display: flex; flex-direction: column; gap: 2px; border: 1px solid transparent;
}
.item:hover { background: #1a2332; }
.item.selected { background: #1e293b; border-color: var(--accent); }
.item .name { font-weight: 600; word-break: break-all; }
.item .meta { font-size: 10px; color: var(--muted); display: flex; gap: 6px; flex-wrap: wrap; }
.badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; }
.b-raw{background:#7c2d12;color:#fdba74} .b-faue{background:#4c1d95;color:#ddd6fe}
.b-unified{background:#0c4a6e;color:#bae6fd} .b-fact{background:#134e4a;color:#99f6e4}
.b-sql{background:#78350f;color:#fde68a} .b-dbt{background:#581c87;color:#e9d5ff}
.b-dim{background:#334155;color:#cbd5e1} .b-sink{background:#14532d;color:#bbf7d0}
.b-unknown{background:#1e293b;color:#94a3b8} .b-enrich{background:#7c2d12;color:#fed7aa}
.canvas-wrap { position: relative; overflow: auto; background: #070b14; }
#svg { display: block; min-width: 100%; }
.empty {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  color: var(--muted); font-size: 14px; text-align: center; padding: 40px; pointer-events: none;
}
.tip {
  position: fixed; max-width: 360px; background: #1e293b; border: 1px solid #334155;
  border-radius: 8px; padding: 10px 12px; font-size: 11px; line-height: 1.45;
  pointer-events: none; z-index: 50; display: none; box-shadow: 0 12px 40px rgba(0,0,0,.45);
}
.tip.show { display: block; }
.tip strong { display: block; font-size: 12px; margin-bottom: 4px; }
.legend { display: flex; gap: 10px; flex-wrap: wrap; padding: 6px 16px; border-bottom: 1px solid var(--border); background: var(--panel); font-size: 10px; color: var(--muted); }
.legend span { display: flex; align-items: center; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 2px; }
.detail {
  position: absolute; right: 12px; top: 12px; width: 280px; max-height: calc(100% - 24px);
  overflow: auto; background: rgba(17,24,39,.95); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px; font-size: 11px; display: none; z-index: 20;
}
.detail.show { display: block; }
.detail h3 { font-size: 13px; margin-bottom: 6px; word-break: break-all; }
.detail .row { margin: 4px 0; color: var(--muted); }
.detail code { color: #93c5fd; font-size: 10px; word-break: break-all; }
.node-box { cursor: pointer; }
.node-box:hover rect { stroke-width: 2.5; }
</style>
</head>
<body>
<header>
  <div>
    <h1>DataX Full Lineage</h1>
    <div class="stats" id="stats"></div>
  </div>
  <div class="controls">
    <input type="search" id="q" placeholder="Search any table… e.g. fast_section_traffic" autofocus />
    <select id="layer">
      <option value="">All layers</option>
      <option value="raw">Raw</option>
      <option value="faue">faue</option>
      <option value="unified">Unified (faem/faam)</option>
      <option value="fact">Fact aggs</option>
      <option value="sql">Trino SQL</option>
      <option value="dbt">DBT</option>
      <option value="dim">Dimensions</option>
      <option value="sink">Sinks</option>
    </select>
    <select id="pattern">
      <option value="">All patterns</option>
      <option value="A">A Spark→Hive→Vertica→BQ</option>
      <option value="B">B Trino SQL</option>
      <option value="C">C DBT BQ→BQ</option>
    </select>
    <button id="btn-core" title="Show core DataX spine">Core spine</button>
    <button id="btn-clear">Clear</button>
  </div>
</header>
<div class="legend">
  <span><i class="dot" style="background:var(--raw)"></i>Raw</span>
  <span><i class="dot" style="background:var(--faue)"></i>faue</span>
  <span><i class="dot" style="background:var(--unified)"></i>Unified</span>
  <span><i class="dot" style="background:var(--fact)"></i>Fact</span>
  <span><i class="dot" style="background:var(--sql)"></i>Trino</span>
  <span><i class="dot" style="background:var(--dbt)"></i>DBT</span>
  <span><i class="dot" style="background:var(--dim)"></i>Dim</span>
  <span><i class="dot" style="background:var(--sink)"></i>Sink</span>
  <span>Click a table → full upstream + downstream. Hover edges for via.</span>
</div>
<div class="main">
  <aside class="sidebar">
    <div class="section-title" id="list-title">Tables</div>
    <div class="list" id="list"></div>
  </aside>
  <div class="canvas-wrap" id="canvas-wrap">
    <div class="empty" id="empty">Search or pick a table on the left to explore end-to-end lineage.<br/>Or click <b>Core spine</b> for the main DataX flow.</div>
    <svg id="svg"></svg>
    <div class="detail" id="detail"></div>
  </div>
</div>

let filterQ = '';
let filterLayer = '';
let filterPattern = '';

function matches(n) {
  if (filterLayer && n.layer !== filterLayer) return false;
  if (filterPattern && n.pattern !== filterPattern) return false;
  if (filterQ) {
    const q = filterQ.toLowerCase();
    if (!n.id.toLowerCase().includes(q) && !(n.meta?.config||'').toLowerCase().includes(q)) return false;
  }
  return true;
}

function renderList() {
  const list = document.getElementById('list');
  const items = DATA.nodes.filter(n => n.kind !== 'sink' && matches(n));
  // prefer connected + shorter names first when searching
  items.sort((a,b) => {
    const ac = (fwd[a.id]?.length||0)+(bwd[a.id]?.length||0);
    const bc = (fwd[b.id]?.length||0)+(bwd[b.id]?.length||0);
    if (filterQ) return a.id.length - b.id.length || a.id.localeCompare(b.id);
    return (bc-ac) || a.id.localeCompare(b.id);
  });
  document.getElementById('list-title').textContent = `Tables (${items.length})`;
  const show = items.slice(0, 400);
  list.innerHTML = show.map(n => {
    const deg = (fwd[n.id]?.length||0)+(bwd[n.id]?.length||0);
    const sinks = (n.sinks||[]).slice(0,3).join(', ');
    return `<div class="item ${selected===n.id?'selected':''}" data-id="${n.id}">
      <div class="name">${n.id}</div>
      <div class="meta">
        <span class="badge b-${n.layer}">${n.layer}</span>
        ${n.pattern?`<span class="badge b-unknown">P${n.pattern}</span>`:''}
        <span>${deg} links</span>
        ${sinks?`<span>${sinks}</span>`:''}
      </div>
    </div>`;
  }).join('') + (items.length>400?`<div class="item"><div class="meta">… ${items.length-400} more — refine search</div></div>`:'');
  list.querySelectorAll('.item[data-id]').forEach(el => {
    el.onclick = () => selectNode(el.dataset.id);
  });
}

function bfs(start, adjEdges, getNext) {
  const seen = new Set([start]);
  const q = [start];
  const edgeHits = [];
  while (q.length) {
    const cur = q.shift();
    for (const e of (adjEdges[cur]||[])) {
      const nxt = getNext(e);
      edgeHits.push(e);
      if (!seen.has(nxt)) { seen.add(nxt); q.push(nxt); }
    }
  }
  return { nodes: seen, edges: edgeHits };
}

function selectNode(id) {
  selected = id;
  renderList();
  const up = bfs(id, bwd, e => e.f);
  const down = bfs(id, fwd, e => e.t);
  const nodeSet = new Set([...up.nodes, ...down.nodes]);
  const edgeList = [];
  const ek = new Set();
  for (const e of [...up.edges, ...down.edges]) {
    const k = e.f+'→'+e.t;
    if (!ek.has(k)) { ek.add(k); edgeList.push(e); }
  }
  drawGraph([...nodeSet].map(i => byId[i]).filter(Boolean), edgeList, id);
  showDetail(byId[id]);
  document.getElementById('empty').style.display = 'none';
}

function showCoreSpine() {
  // seed from known core tables
  const seeds = [
    'dwcl_click','pcpc_paid_clicks','pcpi_paid_impression','dwds_dsrequest',
    'faue_clicks','faue_paid_clicks','faue_listings','faue_paid_impressions',
    'faue_requests','faue_pvs','faue_widget_impressions',
    'faem_engage_all_traffic','faam_amplify_all_traffic',
    'fast_section_traffic','facm_campaign_traffic','faad_ad_traffic',
    'facs_campaign_section_traffic','facg_campaign_geo_traffic',
    'fadt_src_doc_traffic','fafp_fms_performance_traffic','faot_optimised_traffic',
    'faoe_os_browser_engage_traffic','faex_external_id_traffic','faoc_organic_campaign_traffic',
    'famc_multiple_conversion_click_listing_traffic','faar_amplify_realtime',
    'SINK::bq:research','SINK::bq:analytics','SINK::vertica'
  ];
  const nodeSet = new Set();
  const edgeList = [];
  const ek = new Set();
  for (const s of seeds) {
    if (!byId[s]) continue;
    const up = bfs(s, bwd, e => e.f);
    const down = bfs(s, fwd, e => e.t);
    // only keep depth-limited: nodes within 2 hops of any seed OR on path between seeds
    for (const id of [...up.nodes, ...down.nodes]) {
      // keep if layer is core-ish
      const n = byId[id];
      if (!n) continue;
      if (['raw','faue','unified','fact','sink'].includes(n.layer) || seeds.includes(id))
        nodeSet.add(id);
    }
  }
  // edges between kept nodes
  DATA.edges.forEach(e => {
    if (nodeSet.has(e.f) && nodeSet.has(e.t)) {
      const k=e.f+'→'+e.t;
      if (!ek.has(k)) { ek.add(k); edgeList.push(e); }
    }
  });
  selected = null;
  renderList();
  drawGraph([...nodeSet].map(i=>byId[i]).filter(Boolean), edgeList, null);
  document.getElementById('detail').classList.remove('show');
  document.getElementById('empty').style.display = 'none';
  document.getElementById('btn-core').classList.add('active');
}

function showDetail(n) {
  if (!n) return;
  const el = document.getElementById('detail');
  const ups = (bwd[n.id]||[]).map(e=>e.f);
  const downs = (fwd[n.id]||[]).map(e=>e.t);
  el.classList.add('show');
  el.innerHTML = `<h3>${n.id}</h3>
    <div class="row"><span class="badge b-${n.layer}">${n.layer}</span>
      ${n.pattern?` Pattern ${n.pattern}`:''} · ${n.kind||''}</div>
    ${n.sinks?.length?`<div class="row">Sinks: ${n.sinks.join(', ')}</div>`:''}
    ${n.meta?.config?`<div class="row">Config: <code>${n.meta.config}</code></div>`:''}
    ${n.meta?.sql?`<div class="row">SQL: <code>${n.meta.sql}</code></div>`:''}
    ${n.meta?.dbt?`<div class="row">DBT: <code>${n.meta.dbt}</code></div>`:''}
    ${n.meta?.wfe_spark?`<div class="row">WFE: <code>${n.meta.wfe_spark}</code></div>`:''}
    ${n.meta?.wfe_vertica?`<div class="row">WFE Vertica: <code>${n.meta.wfe_vertica}</code></div>`:''}
    ${n.meta?.wfe_verticaOnline?`<div class="row">WFE Online: <code>${n.meta.wfe_verticaOnline}</code></div>`:''}
    <div class="row"><b>Upstream (${ups.length})</b><br/>${ups.slice(0,12).map(x=>`<code>${x}</code>`).join('<br/>')}${ups.length>12?'<br/>…':''}</div>
    <div class="row"><b>Downstream (${downs.length})</b><br/>${downs.slice(0,12).map(x=>`<code>${x}</code>`).join('<br/>')}${downs.length>12?'<br/>…':''}</div>`;
}

function drawGraph(nodes, edgeList, focusId) {
  const svg = document.getElementById('svg');
  const NW = 170, NH = 44, COL_GAP = 80, ROW_GAP = 14, PAD = 40;

  // assign columns by layer, with focus-relative BFS rank refinement
  const colOf = {};
  nodes.forEach(n => {
    let idx = LAYER_ORDER.indexOf(n.layer);
    if (idx < 0) idx = LAYER_ORDER.length - 1;
    colOf[n.id] = idx;
  });

  // barycenter order within columns
  const cols = {};
  nodes.forEach(n => {
    (cols[colOf[n.id]] ||= []).push(n);
  });
  const colKeys = Object.keys(cols).map(Number).sort((a,b)=>a-b);

  // simple ordering: focus first, then by degree, then name
  colKeys.forEach(c => {
    cols[c].sort((a,b) => {
      if (a.id === focusId) return -1;
      if (b.id === focusId) return 1;
      const da = (fwd[a.id]?.length||0)+(bwd[a.id]?.length||0);
      const db = (fwd[b.id]?.length||0)+(bwd[b.id]?.length||0);
      return db-da || a.id.localeCompare(b.id);
    });
  });

  const pos = {};
  let maxRows = 0;
  colKeys.forEach(c => { maxRows = Math.max(maxRows, cols[c].length); });
  const colIndex = {};
  colKeys.forEach((c,i) => { colIndex[c] = i; });

  colKeys.forEach(c => {
    const list = cols[c];
    const x = PAD + colIndex[c] * (NW + COL_GAP);
    list.forEach((n, i) => {
      // center shorter columns
      const yOff = PAD + 36 + Math.floor((maxRows - list.length) * (NH+ROW_GAP) / 2);
      pos[n.id] = { x, y: yOff + i * (NH + ROW_GAP), n };
    });
  });

  const W = PAD * 2 + colKeys.length * (NW + COL_GAP);
  const H = PAD * 2 + 36 + maxRows * (NH + ROW_GAP);
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // column headers
  let hdr = '';
  colKeys.forEach(c => {
    const x = PAD + colIndex[c] * (NW + COL_GAP);
    const label = LAYER_ORDER[c] || 'other';
    hdr += `<text x="${x+NW/2}" y="24" text-anchor="middle" fill="${LAYER_COLOR[label]||'#94a3b8'}" font-size="11" font-weight="700" style="text-transform:uppercase;letter-spacing:1px">${label}</text>`;
  });

  // edges
  let eg = `<defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#334155"/></marker>
    <marker id="arr-hot" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#60a5fa"/></marker>
  </defs>`;
  edgeList.forEach((e,i) => {
    const a = pos[e.f], b = pos[e.t];
    if (!a || !b) return;
    const x1 = a.x + NW, y1 = a.y + NH/2;
    const x2 = b.x, y2 = b.y + NH/2;
    const dx = Math.max(40, (x2-x1)*0.45);
    const hot = focusId && (e.f===focusId || e.t===focusId);
    eg += `<path d="M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}"
      fill="none" stroke="${hot?'#60a5fa':'#334155'}" stroke-width="${hot?2:1.1}"
      marker-end="url(#${hot?'arr-hot':'arr'})" opacity="${hot?1:0.55}"
      data-via="${e.via||''}" data-f="${e.f}" data-t="${e.t}">
      <title>${e.f} → ${e.t} (${e.via||''})</title></path>`;
  });

  // nodes
  let nd = '';
  nodes.forEach(n => {
    const p = pos[n.id];
    if (!p) return;
    const color = LAYER_COLOR[n.layer] || '#64748b';
    const isFocus = n.id === focusId;
    const label = n.id.length > 28 ? n.id.slice(0,26)+'…' : n.id;
    const sub = [n.pattern?`P${n.pattern}`:'', (n.sinks||[])[0]||''].filter(Boolean).join(' · ');
    nd += `<g class="node-box" data-id="${n.id}" transform="translate(${p.x},${p.y})">
      <rect width="${NW}" height="${NH}" rx="7"
        fill="${isFocus?'#1e293b':'#111827'}" stroke="${color}" stroke-width="${isFocus?2.5:1.5}"/>
      <text x="8" y="18" fill="#f1f5f9" font-size="11" font-weight="600">${escapeXml(label)}</text>
      <text x="8" y="34" fill="#94a3b8" font-size="9">${escapeXml(sub || n.layer)}</text>
    </g>`;
  });

  svg.innerHTML = hdr + eg + nd;
  svg.querySelectorAll('.node-box').forEach(g => {
    g.addEventListener('click', () => selectNode(g.dataset.id));
    g.addEventListener('mouseenter', ev => {
      const n = byId[g.dataset.id];
      tip(ev, n.id, tipBody(n));
    });
    g.addEventListener('mousemove', moveTip);
    g.addEventListener('mouseleave', hideTip);
  });
}

function tipBody(n) {
  const parts = [];
  if (n.pattern) parts.push(`Pattern ${n.pattern}`);
  if (n.sinks?.length) parts.push('Sinks: '+n.sinks.join(', '));
  if (n.meta?.config) parts.push(n.meta.config);
  if (n.meta?.sql) parts.push('SQL '+n.meta.sql);
  if (n.meta?.dbt) parts.push(n.meta.dbt);
  parts.push(`↑${(bwd[n.id]||[]).length}  ↓${(fwd[n.id]||[]).length}`);
  return parts.join('\n');
}

function escapeXml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const tipEl = document.getElementById('tip');
function tip(e, title, body) {
  document.getElementById('tip-title').textContent = title;
  document.getElementById('tip-body').textContent = body;
  tipEl.classList.add('show'); moveTip(e);
}
function moveTip(e) {
  tipEl.style.left = (e.clientX+14)+'px';
  tipEl.style.top = (e.clientY+14)+'px';
}
function hideTip() { tipEl.classList.remove('show'); }

document.getElementById('q').addEventListener('input', e => {
  filterQ = e.target.value.trim();
  renderList();
  // auto-select exact or unique match
  if (filterQ && byId[filterQ]) selectNode(filterQ);
  else {
    const hits = DATA.nodes.filter(matches);
    if (hits.length === 1) selectNode(hits[0].id);
  }
});
document.getElementById('layer').addEventListener('change', e => { filterLayer = e.target.value; renderList(); });
document.getElementById('pattern').addEventListener('change', e => { filterPattern = e.target.value; renderList(); });
document.getElementById('btn-core').onclick = showCoreSpine;
document.getElementById('btn-clear').onclick = () => {
  selected=null; filterQ=''; document.getElementById('q').value='';
  document.getElementById('btn-core').classList.remove('active');
  document.getElementById('svg').innerHTML='';
  document.getElementById('detail').classList.remove('show');
  document.getElementById('empty').style.display='';
  renderList();
};

renderList();
// deep-link ?t=table
const params = new URLSearchParams(location.search);
if (params.get('t') && byId[params.get('t')]) selectNode(params.get('t'));
else showCoreSpine();
</script>
</body>
</html>
