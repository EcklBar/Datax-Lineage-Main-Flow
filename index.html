<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DataX Pipeline Lineage</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #0f172a; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

header {
  padding: 14px 24px 12px;
  border-bottom: 1px solid #e2e8f0;
  background: #fff;
  display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  flex-shrink: 0;
}
header h1 { font-size: 17px; font-weight: 600; }
header p  { font-size: 12px; color: #64748b; margin-top: 3px; }

.controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.btn {
  padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid #e2e8f0; background: #fff; color: #475569;
  transition: all .15s;
}
.btn:hover { background: #f1f5f9; }
.btn.active { background: #0f172a; color: #fff; border-color: #0f172a; }

input[type=search], select {
  padding: 6px 10px; border-radius: 6px; font-size: 12px;
  border: 1px solid #e2e8f0; background: #fff; color: #0f172a; min-width: 200px;
}
input[type=search] { min-width: 260px; max-width: 380px; flex: 1; }

.legend {
  display: flex; gap: 14px; flex-wrap: wrap; flex-shrink: 0;
  padding: 8px 24px; border-bottom: 1px solid #e2e8f0;
  background: #fff; font-size: 11px; color: #64748b;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-swatch { width: 10px; height: 10px; border-radius: 2px; }

.main { flex: 1; display: grid; grid-template-columns: 280px 1fr; min-height: 0; }
.sidebar {
  border-right: 1px solid #e2e8f0; background: #fff;
  display: flex; flex-direction: column; min-height: 0;
}
.sidebar .st { padding: 10px 12px 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: #94a3b8; }
.list { overflow: auto; flex: 1; padding: 4px 8px 12px; }
.item {
  padding: 7px 9px; border-radius: 6px; cursor: pointer; border: 1px solid transparent;
}
.item:hover { background: #f1f5f9; }
.item.selected { background: #eff6ff; border-color: #bfdbfe; }
.item .name { font-size: 11px; font-weight: 600; word-break: break-all; }
.item .meta { font-size: 10px; color: #94a3b8; margin-top: 2px; }

.scroll-wrap { overflow: auto; padding: 20px 24px 40px; background: #f8fafc; position: relative; }
.diagram-outer { position: relative; display: inline-block; min-width: 1200px; }
#svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
#node-layer { position: relative; }

.node {
  position: absolute; width: 200px; background: #fff;
  border: 1.5px solid #e2e8f0; border-left-width: 4px; border-radius: 8px;
  padding: 7px 10px; cursor: pointer; transition: box-shadow .15s, opacity .15s; user-select: none;
}
.node:hover { box-shadow: 0 4px 14px rgba(0,0,0,.1); z-index: 10; }
.node .n-label { font-size: 11px; font-weight: 600; color: #0f172a; line-height: 1.35; word-break: break-all; }
.node .n-sub   { font-size: 10px; color: #94a3b8; margin-top: 2px; line-height: 1.3; }
.node.dimmed { opacity: .18; }
.node.highlighted { box-shadow: 0 0 0 2px #64748b, 0 4px 14px rgba(0,0,0,.12); z-index: 10; }
.node.focus { box-shadow: 0 0 0 2px #0f172a, 0 4px 14px rgba(0,0,0,.15); z-index: 11; }

.t-source     { border-left-color: #ea580c; }
.t-enrichment { border-left-color: #d97706; }
.t-faue       { border-left-color: #7c3aed; }
.t-hive_rt    { border-left-color: #4f46e5; background: #f5f3ff; }
.t-batch      { border-left-color: #3b82f6; background: #eff6ff; }
.t-unified    { border-left-color: #0284c7; }
.t-agg        { border-left-color: #0d9488; }
.t-bq         { border-left-color: #16a34a; }
.t-vertica    { border-left-color: #db2777; }
.t-es         { border-left-color: #ea580c; }
.t-sql        { border-left-color: #ca8a04; }
.t-dbt        { border-left-color: #9333ea; }

.tip {
  position: fixed; background: #1e293b; color: #e2e8f0;
  border-radius: 8px; padding: 9px 13px; font-size: 11px;
  max-width: 320px; pointer-events: none; z-index: 200;
  display: none; box-shadow: 0 8px 24px rgba(0,0,0,.3); line-height: 1.5;
}
.tip.show { display: block; }
.tip strong { color: #fff; display: block; margin-bottom: 4px; font-size: 12px; }

.empty {
  position: absolute; inset: 40px; display: flex; align-items: center; justify-content: center;
  color: #94a3b8; font-size: 13px; text-align: center; pointer-events: none;
}
</style>
</head>
<body>

<header>
  <div>
    <h1>DataX Pipeline — Full Lineage</h1>
    <p id="stats-line">Loading…</p>
  </div>
  <div class="controls">
    <input type="search" id="q" placeholder="Search any table… e.g. fast_section_traffic" />
    <select id="pattern">
      <option value="">All patterns</option>
      <option value="A">A Spark→Hive→Vertica→BQ</option>
      <option value="B">B Trino SQL</option>
      <option value="C">C DBT</option>
    </select>
    <button class="btn active" id="btn-core" onclick="showCore()">Core spine</button>
    <button class="btn" onclick="setPathFilter('all',this)">All</button>
    <button class="btn" onclick="setPathFilter('rt',this)">RT</button>
    <button class="btn" onclick="setPathFilter('batch',this)">Batch</button>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#ea580c"></div>Raw</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#7c3aed"></div>faue</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#0284c7"></div>Unified (faem/faam)</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#0d9488"></div>Fact aggs</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#ca8a04"></div>Trino SQL</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#9333ea"></div>DBT</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#d97706"></div>Dim / enrich</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#16a34a"></div>BQ</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#db2777"></div>Vertica</div>
  <div class="legend-item">Hover to trace · click table for full upstream/downstream</div>
</div>

<div class="main">
  <aside class="sidebar">
    <div class="st" id="list-title">Tables</div>
    <div class="list" id="list"></div>
  </aside>
  <div class="scroll-wrap" id="scroll-wrap">
    <div class="empty" id="empty"></div>
    <div class="diagram-outer" id="diagram-outer">
      <div id="node-layer"></div>
      <svg id="svg-layer"></svg>
    </div>
  </div>
</div>

function bfs(start, adj, next) {
  const seen = new Set([start]);
  const q = [start];
  const hit = [];
  while (q.length) {
    const cur = q.shift();
    for (const e of (adj[cur] || [])) {
      if (pathFilter !== 'all' && e.path !== 'both' && e.path !== pathFilter) continue;
      hit.push(e);
      const n = next(e);
      if (!seen.has(n)) { seen.add(n); q.push(n); }
    }
  }
  return { nodes: seen, edges: hit };
}

function edgeKey(e) { return e.f + '→' + e.t; }

function selectFocus(id) {
  if (!byId[id]) return;
  mode = 'focus';
  focusId = id;
  document.getElementById('btn-core').classList.remove('active');
  const up = bfs(id, bwd, e => e.f);
  const down = bfs(id, fwd, e => e.t);
  const ids = new Set([...up.nodes, ...down.nodes]);
  const ek = new Set();
  const elist = [];
  for (const e of [...up.edges, ...down.edges]) {
    const k = edgeKey(e);
    if (!ek.has(k) && ids.has(e.f) && ids.has(e.t)) { ek.add(k); elist.push(e); }
  }
  renderGraph([...ids].map(i => byId[i]).filter(Boolean), elist, id);
  renderList();
}

function showCore() {
  mode = 'core';
  focusId = null;
  document.getElementById('btn-core').classList.add('active');
  document.querySelectorAll('.controls .btn').forEach(b => {
    if (b.id !== 'btn-core' && ['All','RT','Batch'].includes(b.textContent.trim())) {
      // leave path buttons
    }
  });
  const ids = new Set();
  CORE_SEEDS.forEach(s => { if (byId[s]) ids.add(s); });
  // include 1-hop neighbors in core layers only
  const coreLayers = new Set(['raw','faue','unified','fact','sink']);
  [...ids].forEach(id => {
    for (const e of [...(fwd[id]||[]), ...(bwd[id]||[])]) {
      if (pathFilter !== 'all' && e.path !== 'both' && e.path !== pathFilter) continue;
      const other = e.f === id ? e.t : e.f;
      const n = byId[other];
      if (n && (coreLayers.has(n.layer) || CORE_SEEDS.includes(other))) ids.add(other);
    }
  });
  // also pull full upstream of facts into faue/raw for connected picture
  ['fast_section_traffic','facm_campaign_traffic','faem_engage_all_traffic','faam_amplify_all_traffic'].forEach(s => {
    if (!byId[s]) return;
    const up = bfs(s, bwd, e => e.f);
    up.nodes.forEach(id => {
      const n = byId[id];
      if (n && coreLayers.has(n.layer)) ids.add(id);
    });
  });
  const elist = [];
  const ek = new Set();
  DATA.edges.forEach(e => {
    if (!ids.has(e.f) || !ids.has(e.t)) return;
    if (pathFilter !== 'all' && e.path !== 'both' && e.path !== pathFilter) return;
    const k = edgeKey(e);
    if (!ek.has(k)) { ek.add(k); elist.push(e); }
  });
  renderGraph([...ids].map(i => byId[i]).filter(Boolean), elist, null);
  renderList();
}

function setPathFilter(f, btn) {
  pathFilter = f;
  document.querySelectorAll('.controls .btn').forEach(b => {
    if (['All','RT','Batch'].includes(b.textContent.trim())) b.classList.remove('active');
  });
  btn.classList.add('active');
  if (mode === 'focus' && focusId) selectFocus(focusId);
  else showCore();
}

function matchesList(n) {
  if (n.kind === 'sink' && !searchQ) return false;
  if (patternFilter && n.pattern !== patternFilter) return false;
  if (searchQ) {
    const q = searchQ.toLowerCase();
    if (!n.id.toLowerCase().includes(q) && !(n.meta?.config||'').toLowerCase().includes(q)
        && !(n.meta?.sql||'').toLowerCase().includes(q) && !(n.meta?.dbt||'').toLowerCase().includes(q))
      return false;
  }
  return true;
}

function renderList() {
  const items = DATA.nodes.filter(matchesList);
  items.sort((a,b) => {
    if (searchQ) return a.id.length - b.id.length || a.id.localeCompare(b.id);
    const da = (fwd[a.id]?.length||0)+(bwd[a.id]?.length||0);
    const db = (fwd[b.id]?.length||0)+(bwd[b.id]?.length||0);
    return db-da || a.id.localeCompare(b.id);
  });
  document.getElementById('list-title').textContent = `Tables (${items.length})`;
  const show = items.slice(0, 350);
  const list = document.getElementById('list');
  list.innerHTML = show.map(n => {
    const deg = (fwd[n.id]?.length||0)+(bwd[n.id]?.length||0);
    return `<div class="item ${focusId===n.id?'selected':''}" data-id="${n.id}">
      <div class="name">${n.id}</div>
      <div class="meta">${n.layer}${n.pattern?' · P'+n.pattern:''} · ${deg} links</div>
    </div>`;
  }).join('') + (items.length>350?`<div class="item"><div class="meta">… refine search</div></div>`:'');
  list.querySelectorAll('.item[data-id]').forEach(el => {
    el.onclick = () => selectFocus(el.dataset.id);
  });
}

function renderGraph(nodes, edges, focus) {
  visibleNodeIds = new Set(nodes.map(n => n.id));
  visibleEdges = edges;
  const empty = document.getElementById('empty');
  empty.style.display = nodes.length ? 'none' : '';
  empty.textContent = 'No tables match — try another search.';

  const NW = 200, NH = 52, RG = 12, HEADER_H = 40, PAD_X = 24, PAD_Y = 28, COL_GAP = 110;

  // group by column
  const cols = {};
  nodes.forEach(n => {
    const c = LAYER_COL[n.layer] ?? 6;
    (cols[c] ||= []).push(n);
  });
  const colKeys = Object.keys(cols).map(Number).sort((a,b)=>a-b);
  colKeys.forEach(c => {
    cols[c].sort((a,b) => {
      if (a.id === focus) return -1;
      if (b.id === focus) return 1;
      const da=(fwd[a.id]?.length||0)+(bwd[a.id]?.length||0);
      const db=(fwd[b.id]?.length||0)+(bwd[b.id]?.length||0);
      return db-da || a.id.localeCompare(b.id);
    });
  });

  const maxRows = Math.max(1, ...colKeys.map(c => cols[c].length));
  const colIndex = {};
  colKeys.forEach((c,i) => colIndex[c]=i);
  const numCols = colKeys.length;
  const CANVAS_W = PAD_X*2 + numCols*(NW+COL_GAP);
  const CANVAS_H = HEADER_H + PAD_Y*2 + maxRows*(NH+RG);

  const outer = document.getElementById('diagram-outer');
  const layer = document.getElementById('node-layer');
  const svgEl = document.getElementById('svg-layer');
  outer.style.height = CANVAS_H + 'px';
  outer.style.minWidth = CANVAS_W + 'px';
  layer.style.height = CANVAS_H + 'px';
  layer.innerHTML = '';
  svgEl.innerHTML = '';
  svgEl.setAttribute('viewBox', `0 0 ${CANVAS_W} ${CANVAS_H}`);
  svgEl.setAttribute('width', CANVAS_W);
  svgEl.setAttribute('height', CANVAS_H);

  // headers
  const hdr = document.createElement('div');
  hdr.style.cssText = `position:absolute;top:0;left:0;width:100%;height:${HEADER_H}px;`;
  colKeys.forEach(c => {
    const meta = COL_LABELS[c] || { label: 'Other', color: '#64748b' };
    const d = document.createElement('div');
    const x = PAD_X + colIndex[c]*(NW+COL_GAP);
    d.style.cssText = `position:absolute;left:${x}px;top:8px;width:${NW}px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:${meta.color};`;
    d.textContent = meta.label;
    hdr.appendChild(d);
  });
  layer.appendChild(hdr);

  const nodePos = {};
  colKeys.forEach(c => {
    const list = cols[c];
    const colH = list.length*NH + (list.length-1)*RG;
    const top = HEADER_H + PAD_Y + Math.round((maxRows*(NH+RG)-RG - colH)/2);
    const x = PAD_X + colIndex[c]*(NW+COL_GAP);
    list.forEach((n,i) => { nodePos[n.id] = { x, y: top + i*(NH+RG), n }; });
  });

  nodeEls = {};
  nodes.forEach(n => {
    const p = nodePos[n.id];
    const d = document.createElement('div');
    d.className = `node t-${n.type||'source'}` + (n.id===focus?' focus':'');
    d.style.left = p.x+'px'; d.style.top = p.y+'px';
    d.innerHTML = `<div class="n-label">${esc(n.label||n.id)}</div><div class="n-sub">${esc(n.sub||n.layer)}</div>`;
    d.onmouseenter = e => { onHover(n.id); showTip(e,n); };
    d.onmousemove = moveTip;
    d.onmouseleave = () => { clearHover(); hideTip(); };
    d.onclick = () => selectFocus(n.id);
    layer.appendChild(d);
    nodeEls[n.id] = d;
  });

  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML = `<marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#cbd5e1"/></marker>
    <marker id="arr-rt" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#10b981"/></marker>
    <marker id="arr-batch" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#3b82f6"/></marker>`;
  svgEl.appendChild(defs);

  edgeEls = [];
  edges.forEach(e => {
    const fp = nodePos[e.f], tp = nodePos[e.t];
    if (!fp || !tp) return;
    const x1=fp.x+NW, y1=fp.y+NH/2, x2=tp.x, y2=tp.y+NH/2;
    const dx=Math.max(50,(x2-x1)*0.45);
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','#cbd5e1');
    path.setAttribute('stroke-width','1.2');
    path.setAttribute('marker-end','url(#arr)');
    path.setAttribute('opacity','0.7');
    path.dataset.from=e.f; path.dataset.to=e.t; path.dataset.path=e.path||'both';
    svgEl.appendChild(path);
    edgeEls.push(path);
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function onHover(id) {
  const down = bfsReach(id, fwd);
  const up = bfsReach(id, bwd);
  const rel = new Set([...down, ...up]);
  Object.keys(nodeEls).forEach(nid => {
    const el = nodeEls[nid];
    if (rel.has(nid)) { el.classList.remove('dimmed'); el.classList.add('highlighted'); }
    else { el.classList.add('dimmed'); el.classList.remove('highlighted'); }
  });
  edgeEls.forEach(p => {
    const ok = rel.has(p.dataset.from) && rel.has(p.dataset.to);
    if (ok) {
      const ep = p.dataset.path;
      p.setAttribute('stroke', ep==='rt'?'#10b981':ep==='batch'?'#3b82f6':'#94a3b8');
      p.setAttribute('stroke-width','2'); p.setAttribute('opacity','1');
      p.setAttribute('marker-end', ep==='rt'?'url(#arr-rt)':ep==='batch'?'url(#arr-batch)':'url(#arr)');
    } else {
      p.setAttribute('stroke','#e2e8f0'); p.setAttribute('stroke-width','1'); p.setAttribute('opacity','0.35');
    }
  });
}

function bfsReach(start, adj) {
  const seen = new Set([start]);
  const q = [start];
  while (q.length) {
    const cur = q.shift();
    for (const e of (adj[cur]||[])) {
      if (!visibleNodeIds.has(e.f) && !visibleNodeIds.has(e.t)) continue;
      // only follow edges currently drawn
      const other = e.f===cur ? e.t : (e.t===cur ? e.f : null);
      // adj is directed
      const nxt = adj===fwd ? e.t : e.f;
      if (visibleNodeIds.has(nxt) && !seen.has(nxt)) { seen.add(nxt); q.push(nxt); }
    }
  }
  return seen;
}

function clearHover() {
  Object.values(nodeEls).forEach(el => el.classList.remove('dimmed','highlighted'));
  edgeEls.forEach(p => {
    p.setAttribute('stroke','#cbd5e1'); p.setAttribute('stroke-width','1.2');
    p.setAttribute('opacity','0.7'); p.setAttribute('marker-end','url(#arr)');
  });
}

const tipEl = document.getElementById('tip');
function showTip(e, n) {
  document.getElementById('tip-title').textContent = n.id;
  const ups = (bwd[n.id]||[]).length, downs = (fwd[n.id]||[]).length;
  document.getElementById('tip-body').textContent = (n.tip||'') + `\n↑${ups} upstream · ↓${downs} downstream`;
  tipEl.classList.add('show'); moveTip(e);
}
function moveTip(e) { tipEl.style.left=(e.clientX+14)+'px'; tipEl.style.top=(e.clientY+14)+'px'; }
function hideTip() { tipEl.classList.remove('show'); }

document.getElementById('q').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  renderList();
  if (searchQ && byId[searchQ]) selectFocus(searchQ);
  else {
    const hits = DATA.nodes.filter(matchesList);
    if (hits.length === 1) selectFocus(hits[0].id);
  }
});
document.getElementById('pattern').addEventListener('change', e => {
  patternFilter = e.target.value;
  renderList();
});

const params = new URLSearchParams(location.search);
renderList();
if (params.get('t') && byId[params.get('t')]) selectFocus(params.get('t'));
else showCore();
</script>
</body>
